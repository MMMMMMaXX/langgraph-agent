services:
  langgraph-agent:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_GIT_SHA: ${APP_GIT_SHA:-unknown}
        APP_BUILD_TIME: ${APP_BUILD_TIME:-unknown}
        APP_VERSION: ${APP_VERSION:-dev}
    image: ${LANGGRAPH_AGENT_IMAGE:-langgraph-agent:${IMAGE_TAG:-prod}}
    container_name: ${LANGGRAPH_AGENT_CONTAINER:-langgraph-agent-prod}
    env_file:
      - .env
    ports:
      - "${LANGGRAPH_AGENT_PORT:-8000}:8000"
    volumes:
      - langgraph_data:/app/data
      - langgraph_outputs:/app/outputs
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped

volumes:
  langgraph_data:
  langgraph_outputs:
