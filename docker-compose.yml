services:
  langgraph-agent:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_GIT_SHA: ${APP_GIT_SHA:-unknown}
        APP_BUILD_TIME: ${APP_BUILD_TIME:-unknown}
        APP_VERSION: ${APP_VERSION:-dev}
    image: langgraph-agent:${IMAGE_TAG:-local}
    container_name: langgraph-agent
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
    healthcheck:
      # 使用 readiness 端点：LLM profile / 历史目录 / Chroma 目录 任一异常都会失败
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped
