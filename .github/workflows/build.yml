# Build & Push: 构建 Docker 镜像并推到 ghcr.io
#
# 触发：
#   - push 到 main               -> 推 `main` 和 `sha-<短SHA>` 两个 tag
#   - push 形如 v* 的 tag (如 v0.3.1) -> 再多推一个语义版本 tag
#   - 手动 workflow_dispatch      -> 用于补推 / 应急
# 不部署。部署仍然手动（run server / docker-compose pull && up）。

name: Build & Push

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

# ghcr.io 的写入权限必须显式声明，不然 GITHUB_TOKEN 默认是只读的
permissions:
  contents: read
  packages: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false # 推镜像别互相取消，避免 main / tag 并发时出现空洞

jobs:
  build-and-push:
    name: build & push to ghcr.io
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        # 跨架构构建（linux/arm64）需要 QEMU 做指令翻译，
        # amd64 runner 才能编译出 arm64 的镜像层。
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        # 启用 buildx 以便用 cache-from/to 和多平台构建
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 自动根据事件类型生成 tag 和 OCI labels：
      #   - push main         -> main, sha-xxxxxxx
      #   - push tag v0.3.1   -> v0.3.1, 0.3.1, latest, sha-xxxxxxx
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern=v{{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Compute build metadata
        id: buildmeta
        run: |
          # Dockerfile 里已经通过 ARG 暴露了这三个字段，这里组装好传进去，
          # 最终通过容器环境变量由 /health 回显。
          echo "git_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          # tag 场景下取 tag 名（去掉前导 refs/tags/），其它场景回落到 SHA
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # 同时出 amd64（生产服务器）+ arm64（Apple Silicon 本地验证）
          # 构建时间会变长（arm64 需要 QEMU 模拟），但开发者不用再 --platform 绕。
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.buildmeta.outputs.version }}
            APP_GIT_SHA=${{ steps.buildmeta.outputs.git_sha }}
            APP_BUILD_TIME=${{ steps.buildmeta.outputs.build_time }}
          # 用 GitHub Actions cache 做层缓存，加速后续构建
          cache-from: type=gha
          cache-to: type=gha,mode=max
